moody26.settings:
  type: theme_settings
  label: 'Moody 26 settings'
  mapping:
    give_link:
      type: uri
      label: 'Give link'
    parent_link_title:
      type: label
      label: 'Parent-unit link label'
    parent_link:
      type: uri
      label: 'Parent-unit link URL'
    header_social_links_block:
      type: string
      label: 'Header Social Links content block UUID'
    motion_gsap_enabled:
      type: boolean
      label: 'Enable coordinated page motion with GSAP'
    motion_anime_enabled:
      type: boolean
      label: 'Enable interface motion with Anime.js'
