<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Moody26 Scroll Reveal Media states</title>
    <link rel="stylesheet" href="../fonts.css">
    <link rel="stylesheet" href="../../tokens.css">
    <link rel="stylesheet" href="scroll-reveal-media.css">
    <style>
      body {
        margin: 0;
        padding: var(--space-lg);
        background: var(--color-paper);
        color: var(--color-ink);
        font-family: var(--font-body);
      }
      main {
        max-width: var(--content-max);
        margin-inline: auto;
      }
      .preview-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(min(100%, 18rem), 1fr));
        gap: var(--space-xl);
      }
      .preview-state {
        min-width: 0;
      }
      .preview-state > h2 {
        margin: 0 0 var(--space-sm);
        font: 700 var(--text-base) / var(--leading-body) var(--font-body);
      }
      .preview-media {
        display: grid;
        min-height: 12rem;
        place-items: center;
        color: var(--color-muted);
        font: 700 var(--text-display-s) / 1 var(--font-display);
      }
    </style>
  </head>
  <body>
    <main class="moody26-scroll-media">
      <header class="moody26-scroll-media__header">
        <h1 class="moody26-scroll-media__headline">Media-sequence states</h1>
      </header>

      <div class="preview-grid">
        <section class="preview-state">
          <h2>Default</h2>
          <article class="moody26-scroll-media__item">
            <div class="moody26-scroll-media__media-inner"><span class="preview-media" aria-hidden="true">01</span></div>
            <a class="moody26-scroll-media__link" href="#default">View default item</a>
          </article>
        </section>

        <section class="preview-state">
          <h2>Hover</h2>
          <article class="moody26-scroll-media__item">
            <div class="moody26-scroll-media__media-inner"><span class="preview-media" aria-hidden="true">02</span></div>
            <a class="moody26-scroll-media__link is-hover" href="#hover">View hovered item</a>
          </article>
        </section>

        <section class="preview-state">
          <h2>Focus</h2>
          <article class="moody26-scroll-media__item">
            <div class="moody26-scroll-media__media-inner"><span class="preview-media" aria-hidden="true">03</span></div>
            <a class="moody26-scroll-media__link is-focus" href="#focus">View focused item</a>
          </article>
        </section>

        <section class="preview-state">
          <h2>Active</h2>
          <article class="moody26-scroll-media__item">
            <div class="moody26-scroll-media__media-inner"><span class="preview-media" aria-hidden="true">04</span></div>
            <a class="moody26-scroll-media__link is-active" href="#active">View active item</a>
          </article>
        </section>

        <section class="preview-state">
          <h2>Disabled</h2>
          <article class="moody26-scroll-media__item">
            <div class="moody26-scroll-media__media-inner"><span class="preview-media" aria-hidden="true">05</span></div>
            <a class="moody26-scroll-media__link is-disabled" aria-disabled="true">Unavailable item</a>
          </article>
        </section>

        <section class="preview-state">
          <h2>Loading</h2>
          <article class="moody26-scroll-media__item is-loading" aria-busy="true">
            <div class="moody26-scroll-media__media-inner"><p class="moody26-scroll-media__status">Loading media…</p></div>
          </article>
        </section>

        <section class="preview-state">
          <h2>Error</h2>
          <article class="moody26-scroll-media__item is-error">
            <div class="moody26-scroll-media__media-inner"><p class="moody26-scroll-media__status">Media unavailable</p></div>
          </article>
        </section>

        <section class="preview-state">
          <h2>Success</h2>
          <article class="moody26-scroll-media__item is-success">
            <div class="moody26-scroll-media__media-inner"><span class="preview-media" aria-hidden="true">08</span></div>
            <a class="moody26-scroll-media__link" href="#success">View ready item</a>
          </article>
        </section>
      </div>
    </main>
  </body>
</html>
